{% extends "base.html" %}
{% block body %}
<main class="app-shell">
  <aside class="sidebar">
    <div>
      <p class="eyebrow">数据优先</p>
      <h1>X-UI 中文控制台</h1>
    </div>
    <nav class="nav">
      <a href="/dashboard">首页</a>
      <a class="active" href="/sources">订阅源</a>
      <a href="/groups">分组规则</a>
      <a href="/generate">生成</a>
      <a href="/reports">报告</a>
    </nav>
    <form method="post" action="/logout">
      <button class="secondary" type="submit">退出登录</button>
    </form>
  </aside>

  <section class="content">
    <header class="hero">
      <div>
        <p class="eyebrow">订阅源</p>
        <h2>管理订阅源</h2>
        <p class="subtitle">在一张表格里维护 source id、URL、启用状态和格式。</p>
      </div>
    </header>

    {% if saved %}
    <div class="success-banner">订阅源已保存。</div>
    {% endif %}

    <form class="panel" method="post" action="/sources/save">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>URL</th>
            <th>启用</th>
            <th>格式</th>
          </tr>
        </thead>
        <tbody>
          {% for item in mapping.get("sources", []) %}
          <tr>
            <td><input name="source_id" value="{{ item.get('id') }}"></td>
            <td><input class="mono" name="source_url" value="{{ item.get('url') }}"></td>
            <td>
              <select name="source_enabled">
                <option value="true" {% if item.get('enabled', True) %}selected{% endif %}>启用</option>
                <option value="false" {% if not item.get('enabled', True) %}selected{% endif %}>停用</option>
              </select>
            </td>
            <td><input name="source_format" value="{{ item.get('format', 'clash') }}"></td>
          </tr>
          {% endfor %}
          <tr>
            <td><input name="source_id" value=""></td>
            <td><input class="mono" name="source_url" value=""></td>
            <td>
              <select name="source_enabled">
                <option value="true" selected>启用</option>
                <option value="false">停用</option>
              </select>
            </td>
            <td><input name="source_format" value="clash"></td>
          </tr>
        </tbody>
      </table>
      <div class="form-actions">
        <button type="submit">保存订阅源</button>
      </div>
    </form>
  </section>
</main>
{% endblock %}
