services:
  generator:
    build: .
    container_name: xui-config-generator
    working_dir: /app
    command:
      - python
      - generate_xray_config.py
      - --mapping
      - /app/config/mapping.yaml
      - --template
      - /app/config/config.json
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./config:/app/config
      - ./data/cache:/app/cache
      - ./data/state:/app/state
      - ./output:/app/output
  web:
    build: .
    container_name: xui-config-web
    working_dir: /app
    command:
      - uvicorn
      - xui_port_pool_generator_web.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    env_file:
      - .env
    environment:
      WEB_MAPPING_PATH: /app/config/mapping.yaml
      WEB_TEMPLATE_PATH: /app/config/config.json
      WEB_WORKDIR: /app
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./data/cache:/app/cache
      - ./data/state:/app/state
      - ./output:/app/output
